name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe what went wrong...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: Describe the expected behavior...
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error...
  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: e.g. Chrome 120, macOS 14
  - type: dropdown
    id: view-mode
    attributes:
      label: View mode
      options:
        - 3D
        - 2D
        - Both
